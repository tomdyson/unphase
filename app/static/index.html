<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>unphase — mic alignment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
    ></script>
  </head>
  <body x-data="unphase()" x-cloak>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark">U</div>
          <div class="name">unphase</div>
          <div class="ver">v2 · batch</div>
        </div>
        <div class="spacer"></div>
        <div class="meta">
          <span class="hstack"><span class="dot"></span> session</span>
          <span x-text="files.length + ' file' + (files.length === 1 ? '' : 's')"></span>
          <template x-if="refFile">
            <span class="hstack"><span>·</span><span x-text="'ref: ' + truncate(refFile.name, 32)"></span></span>
          </template>
        </div>
        <button
          class="btn"
          :disabled="!hasResults"
          @click="exportCsv()"
          title="Download session results as CSV"
        >
          <span x-html="icons.download"></span> Export session
        </button>
      </header>

      <div class="main">
        <!-- LEFT PANE -->
        <aside class="left-pane">
          <div class="section-title">
            <div class="eyebrow">Session files</div>
            <button
              class="btn ghost small"
              @click="$refs.picker.click()"
              :disabled="running"
            >
              <span x-html="icons.upload"></span> Add files
            </button>
          </div>

          <div
            class="dropzone"
            :class="{ drag: dragging }"
            @dragover.prevent="dragging = true"
            @dragleave.prevent="dragging = false"
            @drop.prevent="handleDrop($event)"
            @click="$refs.picker.click()"
          >
            <span x-html="icons.upload"></span>
            <div class="big">Drop audio files to add</div>
            <div class="sub mono">WAV · AIFF · FLAC · MP3 · M4A · up to 200 MB each</div>
            <input
              x-ref="picker"
              type="file"
              multiple
              hidden
              accept="audio/*,.wav,.aiff,.flac,.mp3,.m4a"
              @change="handlePick($event)"
            />
          </div>

          <div class="files">
            <template x-for="(f, i) in files" :key="f.id">
              <div
                class="file-row"
                :class="{
                  ref: f.id === refId,
                  selected: f.id === selectedId && f.id !== refId,
                }"
                @click="selectFile(f.id)"
              >
                <div class="idx mono" x-text="String(i + 1).padStart(2, '0')"></div>
                <div class="name">
                  <div class="t" x-text="f.name"></div>
                  <div class="m">
                    <span x-text="formatSize(f.size)"></span>
                    <template x-if="f.duration">
                      <span><span>·</span> <span x-text="formatDuration(f.duration)"></span></span>
                    </template>
                    <template x-if="f.channels">
                      <span><span>·</span> <span x-text="channelLabel(f.channels)"></span></span>
                    </template>
                  </div>
                </div>
                <div>
                  <template x-if="f.id === refId">
                    <span class="status ok">reference</span>
                  </template>
                  <template x-if="f.id !== refId">
                    <span class="status" :class="fileStatusClass(f)" x-text="fileStatusLabel(f)"></span>
                  </template>
                </div>
                <div class="hstack" style="gap: 2px">
                  <button
                    class="icon-btn"
                    :class="{ active: f.id === refId }"
                    :title="f.id === refId ? 'Reference track' : 'Pin as reference'"
                    @click.stop="pinReference(f.id)"
                    :disabled="running"
                  >
                    <span x-html="icons.pin"></span>
                  </button>
                  <button
                    class="icon-btn"
                    title="Remove"
                    @click.stop="removeFile(f.id)"
                    :disabled="running"
                  >
                    <span x-html="icons.x"></span>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <div
            class="hstack mono"
            style="font-size: 11px; color: var(--ink-4); justify-content: space-between; flex-wrap: wrap; gap: 6px"
            x-show="files.length > 0"
          >
            <span
              x-text="files.length + ' files · ' + (refId ? '1 reference · ' : '') + Math.max(0, files.length - (refId ? 1 : 0)) + ' to align'"
            ></span>
            <span>window 30 s @ 48 kHz mono · ±50 ms search</span>
          </div>

          <div class="spacer"></div>

          <div class="vstack" style="gap: 10px">
            <div class="progress" x-show="running"></div>
            <button
              class="btn primary"
              style="justify-content: center"
              :disabled="!canAnalyze"
              @click="analyze()"
            >
              <template x-if="running">
                <span x-text="'Analyzing ' + targetCount + ' track' + (targetCount === 1 ? '' : 's') + '…'"></span>
              </template>
              <template x-if="!running && hasResults">
                <span class="hstack" style="gap: 8px"
                  ><span x-html="icons.refresh"></span> Re-analyze</span
                >
              </template>
              <template x-if="!running && !hasResults">
                <span class="hstack" style="gap: 8px"
                  ><span x-html="icons.play"></span>
                  <span x-text="'Analyze ' + targetCount + ' track' + (targetCount === 1 ? '' : 's')"></span>
                </span>
              </template>
            </button>
            <div class="mono muted" style="font-size: 11px; text-align: center">
              <template x-if="running">
                <span x-text="runningStatus"></span>
              </template>
              <template x-if="!running">
                <span x-text="'≈ ' + (targetCount * 0.4).toFixed(1) + ' s on our hardware'"></span>
              </template>
            </div>
          </div>
        </aside>

        <!-- RIGHT PANE -->
        <main class="right-pane">
          <!-- Error banner -->
          <template x-if="error">
            <div class="notice err" role="alert">
              <div class="ic"><span x-html="icons.alert"></span></div>
              <div>
                <h4>Something went wrong</h4>
                <p x-text="error"></p>
              </div>
            </div>
          </template>

          <!-- Idle placeholder -->
          <template x-if="!hasResults && !running && !error">
            <div class="card pad" style="text-align: center; color: var(--ink-3)">
              <div class="eyebrow" style="margin-bottom: 8px">Ready</div>
              <div style="font-size: 14px" x-show="files.length < 2">
                Drop <b>two or more</b> audio files on the left to get started.
              </div>
              <div style="font-size: 14px" x-show="files.length >= 2">
                Pin a reference, then press <b>Analyze</b>. Results appear here.
              </div>
            </div>
          </template>

          <!-- Running card -->
          <template x-if="running && !hasResults">
            <div class="card pad">
              <div class="eyebrow">Running</div>
              <div style="font-size: 14px; margin-top: 6px">
                Cross-correlating each track against
                <b x-text="refFile ? refFile.name : 'reference'"></b>…
              </div>
              <div class="progress" style="margin-top: 14px"></div>
              <div class="mono muted" style="font-size: 11px; margin-top: 10px">
                FFT · 48 kHz mono · 30 s window · ±50 ms search
              </div>
            </div>
          </template>

          <!-- Results -->
          <template x-if="selectedResult">
            <div class="vstack" style="gap: 20px">
              <!-- Headline -->
              <div
                class="headline"
                :class="{ warn: !selectedResult.sanity_ok }"
              >
                <div class="badge">
                  <span x-html="selectedResult.sanity_ok ? icons.check : icons.info"></span>
                </div>
                <div class="txt">
                  <h2 x-html="headlineHtml(selectedResult)"></h2>
                  <p x-html="headlineSub(selectedResult)"></p>
                </div>
                <div class="spacer"></div>
                <div class="vstack" style="align-items: flex-end; gap: 6px">
                  <button class="btn small" @click="copyValues(selectedResult)">
                    <span x-html="icons.copy"></span>
                    <span x-text="copiedId === selectedResult.id ? 'Copied' : 'Copy values'"></span>
                  </button>
                </div>
              </div>

              <!-- KPI grid -->
              <div class="readout-grid">
                <div class="kpi accent">
                  <div class="k">Delay</div>
                  <div class="v num">
                    <span x-text="selectedResult.delay_ms.toFixed(2)"></span><span class="unit">ms</span>
                  </div>
                  <div
                    class="sub"
                    x-text="selectedResult.delay_samples_48k + ' samples @ 48k'"
                  ></div>
                </div>
                <div class="kpi">
                  <div class="k">At 44.1 kHz</div>
                  <div class="v num">
                    <span x-text="selectedResult.delay_samples_44k"></span><span class="unit">samples</span>
                  </div>
                  <div class="sub">for session sample rate</div>
                </div>
                <div class="kpi">
                  <div class="k">Polarity</div>
                  <div class="v">
                    <span x-text="selectedResult.invert_polarity ? '∅ invert' : 'normal'"></span>
                  </div>
                  <div class="sub" x-text="selectedResult.invert_polarity ? 'flip ∅ on close mic' : 'no inversion needed'"></div>
                </div>
                <div class="kpi">
                  <div class="k">Confidence</div>
                  <div class="v num">
                    <span x-text="Math.round(selectedResult.confidence * 100)"></span><span class="unit">%</span>
                  </div>
                  <div
                    class="sub"
                    x-text="'peak ' + selectedResult.peak_corr.toFixed(2) + ' · ' + selectedResult.peak_over_median.toFixed(1) + '× noise'"
                  ></div>
                </div>
              </div>

              <!-- Sanity notice -->
              <template x-if="!selectedResult.sanity_ok">
                <div class="notice" role="status">
                  <div class="ic"><span x-html="icons.info"></span></div>
                  <div>
                    <h4>Worth a second look</h4>
                    <p>
                      The coarse envelope check puts the offset near
                      <span class="mono" x-text="selectedResult.envelope_lag_samples + ' samples'"></span>, but
                      the fine correlator locked to
                      <span class="mono" x-text="selectedResult.delay_samples_48k + ' samples'"></span>.
                      On steady pitched sources this can happen if the correlator snaps to a pitch-period sidelobe.
                    </p>
                    <ul>
                      <li>Try re-bouncing a section with a clear transient (rim hit, consonant, kick).</li>
                      <li>Verify by ear with a null test in your DAW before applying.</li>
                      <li>Or accept the envelope value as a starting point and fine-tune.</li>
                    </ul>
                  </div>
                </div>
              </template>

              <!-- Waveform compare -->
              <div class="card pad">
                <div class="section-title">
                  <div>
                    <div class="eyebrow">Waveform · aligned</div>
                    <div style="font-size: 13px; color: var(--ink-3); margin-top: 2px">
                      30-second analysis window · transients should line up vertically
                    </div>
                  </div>
                  <div class="btn-group">
                    <button :class="{ on: waveMode === 'aligned' }" @click="waveMode = 'aligned'">Aligned</button>
                    <button :class="{ on: waveMode === 'original' }" @click="waveMode = 'original'">Original</button>
                  </div>
                </div>
                <div class="waves">
                  <div class="wave-row">
                    <div class="label">
                      <div class="t">Reference</div>
                      <div class="m" x-text="refFile ? truncate(refFile.name, 24) : ''"></div>
                    </div>
                    <canvas
                      x-ref="canvasRef"
                      x-effect="drawWave($refs.canvasRef, reference && reference.peaks, 'var(--wave-a)', 0, false)"
                    ></canvas>
                    <div class="meta">0.00 ms</div>
                  </div>
                  <div class="wave-row">
                    <div class="label">
                      <div class="t" x-text="selected ? truncate(selected.name, 24) : ''"></div>
                      <div class="m" x-text="waveMode === 'aligned' ? 'aligned' : 'as recorded'"></div>
                    </div>
                    <canvas
                      x-ref="canvasTgt"
                      x-effect="drawWave($refs.canvasTgt, selectedResult.target_peaks, 'var(--wave-b)', waveShiftPx(), waveMode === 'aligned' && selectedResult.invert_polarity)"
                    ></canvas>
                    <div
                      class="meta"
                      x-text="waveMode === 'aligned' ? '+' + selectedResult.delay_ms.toFixed(2) + ' ms' : '— ms'"
                    ></div>
                  </div>
                </div>
              </div>

              <!-- Spatial diagram -->
              <template x-if="!selectedResult.close_is_reference">
                <div class="spatial">
                  <div class="eyebrow">Spatial — inferred</div>
                  <div class="stage">
                    <svg viewBox="0 0 600 120" preserveAspectRatio="none">
                      <line x1="30" y1="60" x2="570" y2="60" stroke="#d9d6c8" stroke-dasharray="2 4" />
                      <circle cx="60" cy="60" r="8" fill="var(--ink)" />
                      <text x="60" y="92" text-anchor="middle" font-size="10" font-family="JetBrains Mono" fill="#6b6a63">SOURCE</text>
                      <circle cx="240" cy="60" r="6" fill="var(--accent)" />
                      <text x="240" y="44" text-anchor="middle" font-size="10" font-family="JetBrains Mono" font-weight="600" fill="var(--accent-ink)">CLOSE</text>
                      <text x="240" y="92" text-anchor="middle" font-size="10" font-family="JetBrains Mono" fill="#6b6a63">arrives first</text>
                      <circle cx="520" cy="60" r="6" fill="var(--ink-2)" stroke="var(--ink)" stroke-width="1" />
                      <text x="520" y="44" text-anchor="middle" font-size="10" font-family="JetBrains Mono" font-weight="600" fill="var(--ink-2)">REFERENCE</text>
                      <text
                        x="520"
                        y="92"
                        text-anchor="middle"
                        font-size="10"
                        font-family="JetBrains Mono"
                        fill="#6b6a63"
                        x-text="'arrives +' + selectedResult.delay_ms.toFixed(2) + ' ms later'"
                      ></text>
                      <line x1="240" y1="30" x2="520" y2="30" stroke="var(--accent)" stroke-width="1" />
                      <line x1="240" y1="26" x2="240" y2="34" stroke="var(--accent)" stroke-width="1" />
                      <line x1="520" y1="26" x2="520" y2="34" stroke="var(--accent)" stroke-width="1" />
                      <rect x="340" y="16" width="80" height="18" rx="4" fill="white" stroke="var(--accent)" />
                      <text
                        x="380"
                        y="29"
                        text-anchor="middle"
                        font-size="11"
                        font-family="JetBrains Mono"
                        font-weight="600"
                        fill="var(--accent-ink)"
                        x-text="'≈ ' + distanceCm(selectedResult.delay_ms) + ' cm'"
                      ></text>
                      <line x1="60" y1="104" x2="240" y2="104" stroke="#c9c6b8" stroke-dasharray="3 3" />
                      <text x="150" y="116" text-anchor="middle" font-size="10" font-family="JetBrains Mono" fill="#9a9890">unknown distance</text>
                    </svg>
                  </div>
                  <div class="mono muted" style="font-size: 11px; text-align: center">
                    sound travels ≈ 34 cm / ms — only the close-to-reference gap is measured
                  </div>
                </div>
              </template>

              <!-- Batch table -->
              <template x-if="targetFiles.length > 1">
                <div class="card" style="overflow: hidden">
                  <table class="table">
                    <thead>
                      <tr>
                        <th>Track</th>
                        <th>Delay (ms)</th>
                        <th>Samples @48k</th>
                        <th>Polarity</th>
                        <th>Confidence</th>
                        <th>Check</th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="f in targetFiles" :key="f.id">
                        <tr
                          :class="{ selected: f.id === selectedId }"
                          @click="selectFile(f.id)"
                        >
                          <td class="name" x-text="f.name"></td>
                          <td class="num">
                            <template x-if="results[f.id]">
                              <span x-text="results[f.id].delay_ms.toFixed(2)"></span>
                            </template>
                            <template x-if="!results[f.id]">
                              <span class="muted">—</span>
                            </template>
                          </td>
                          <td class="num">
                            <template x-if="results[f.id]">
                              <span x-text="results[f.id].delay_samples_48k"></span>
                            </template>
                            <template x-if="!results[f.id]">
                              <span class="muted">—</span>
                            </template>
                          </td>
                          <td>
                            <template x-if="results[f.id] && results[f.id].invert_polarity">
                              <span class="pill inv">∅ invert</span>
                            </template>
                            <template x-if="results[f.id] && !results[f.id].invert_polarity">
                              <span class="pill">normal</span>
                            </template>
                            <template x-if="!results[f.id]">
                              <span class="muted mono" style="font-size: 11px">—</span>
                            </template>
                          </td>
                          <td>
                            <template x-if="results[f.id]">
                              <div class="hstack" style="gap: 8px">
                                <div
                                  class="confidence-bar"
                                  :class="{ warn: results[f.id].confidence < 0.6 }"
                                >
                                  <span
                                    :style="'width: ' + (results[f.id].confidence * 100) + '%'"
                                  ></span>
                                </div>
                                <span
                                  class="mono num"
                                  style="font-size: 11px; color: var(--ink-3)"
                                  x-text="(results[f.id].confidence * 100).toFixed(0) + '%'"
                                ></span>
                              </div>
                            </template>
                            <template x-if="!results[f.id]">
                              <span class="muted mono" style="font-size: 11px">—</span>
                            </template>
                          </td>
                          <td>
                            <template x-if="results[f.id] && results[f.id].sanity_ok">
                              <span class="pill ok"
                                ><span x-html="icons.check10"></span> clean</span
                              >
                            </template>
                            <template x-if="results[f.id] && !results[f.id].sanity_ok">
                              <span class="pill warn"
                                ><span x-html="icons.info10"></span> review</span
                              >
                            </template>
                            <template x-if="!results[f.id]">
                              <span class="muted mono" style="font-size: 11px">—</span>
                            </template>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </template>

              <!-- Tech details -->
              <details class="card pad">
                <summary class="mono" style="cursor: pointer; color: var(--ink-2); font-size: 12px">
                  <span x-html="icons.chev"></span>
                  Technical details
                </summary>
                <div
                  style="
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 6px 24px;
                    margin-top: 12px;
                    font-size: 12.5px;
                  "
                >
                  <template x-for="row in techRows(selectedResult)" :key="row[0]">
                    <div
                      class="hstack"
                      style="
                        justify-content: space-between;
                        border-bottom: 1px dashed var(--border);
                        padding: 6px 0;
                      "
                    >
                      <span class="mono" style="color: var(--ink-4)" x-text="row[0]"></span>
                      <span class="mono num" style="color: var(--ink-2)" x-text="row[1]"></span>
                    </div>
                  </template>
                </div>
              </details>
            </div>
          </template>
        </main>
      </div>
    </div>

    <script>
      const ICONS = {
        upload: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12M6 10l6-6 6 6M4 20h16"/></svg>',
        download: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12M6 12l6 6 6-6M4 20h16"/></svg>',
        pin: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5M5 9V3h14v6l-3 3v3H8v-3z"/></svg>',
        x: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
        play: '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
        refresh: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>',
        check: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
        info: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>',
        copy: '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
        alert: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>',
        chev: '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px"><path d="M6 9l6 6 6-6"/></svg>',
        check10: '<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
        info10: '<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>',
      };

      function unphase() {
        return {
          icons: ICONS,
          files: [],
          refId: null,
          selectedId: null,
          results: {},
          reference: null,
          running: false,
          error: null,
          dragging: false,
          currentIndex: null,
          currentPhase: null,
          uploadPct: 0,
          waveMode: 'aligned',
          copiedId: null,

          get targetFiles() {
            return this.files.filter((f) => f.id !== this.refId);
          },
          get targetCount() {
            return Math.max(0, this.files.length - (this.refId ? 1 : 0));
          },
          get canAnalyze() {
            return this.files.length >= 2 && this.refId && !this.running;
          },
          get hasResults() {
            return Object.keys(this.results).length > 0;
          },
          get refFile() {
            return this.files.find((f) => f.id === this.refId);
          },
          get selected() {
            return this.files.find((f) => f.id === this.selectedId);
          },
          get selectedResult() {
            if (!this.selectedId || !this.results[this.selectedId]) return null;
            return { ...this.results[this.selectedId], id: this.selectedId };
          },
          get runningStatus() {
            if (this.uploadPct < 1) return 'uploading ' + Math.round(this.uploadPct * 100) + '%';
            if (this.currentPhase === 'decoding' && this.currentIndex != null) {
              return 'decoding ' + (this.files[this.currentIndex]?.name || '');
            }
            if (this.currentPhase === 'analyzing' && this.currentIndex != null) {
              return 'aligning ' + (this.files[this.currentIndex]?.name || '');
            }
            return 'working…';
          },

          addFiles(fileList) {
            const additions = [...fileList].map((file) => ({
              id: 'f' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
              name: file.name,
              size: file.size,
              file,
              status: 'ready',
              duration: null,
              channels: null,
            }));
            this.files = [...this.files, ...additions];
            if (!this.refId && this.files.length) this.refId = this.files[0].id;
            if (!this.selectedId) {
              const first = this.files.find((f) => f.id !== this.refId);
              if (first) this.selectedId = first.id;
            }
            this.results = {};
            this.reference = null;
            this.error = null;
          },

          handleDrop(event) {
            this.dragging = false;
            if (event.dataTransfer?.files?.length) this.addFiles(event.dataTransfer.files);
          },
          handlePick(event) {
            if (event.target.files?.length) this.addFiles(event.target.files);
            event.target.value = '';
          },

          removeFile(id) {
            this.files = this.files.filter((f) => f.id !== id);
            delete this.results[id];
            if (id === this.refId) {
              this.refId = this.files[0]?.id || null;
              this.results = {};
              this.reference = null;
            }
            if (id === this.selectedId) {
              const nextSel = this.files.find((f) => f.id !== this.refId);
              this.selectedId = nextSel?.id || null;
            }
          },
          pinReference(id) {
            if (this.running) return;
            this.refId = id;
            if (this.selectedId === id) {
              const other = this.files.find((f) => f.id !== id);
              this.selectedId = other?.id || null;
            }
            this.results = {};
            this.reference = null;
          },
          selectFile(id) {
            if (id === this.refId) return;
            this.selectedId = id;
          },

          analyze() {
            if (!this.canAnalyze) return;
            this.running = true;
            this.error = null;
            this.results = {};
            this.reference = null;
            this.uploadPct = 0;
            this.currentIndex = null;
            this.currentPhase = null;

            const form = new FormData();
            const refIndex = this.files.findIndex((f) => f.id === this.refId);
            form.append('reference_index', String(refIndex));
            for (const f of this.files) form.append('files', f.file, f.name);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/align');
            xhr.upload.onprogress = (e) => {
              if (e.lengthComputable) this.uploadPct = e.loaded / e.total;
            };
            xhr.upload.onload = () => {
              this.uploadPct = 1;
            };

            let parsedOffset = 0;
            const consume = () => {
              const text = xhr.responseText;
              while (true) {
                const nl = text.indexOf('\n', parsedOffset);
                if (nl < 0) break;
                const line = text.slice(parsedOffset, nl);
                parsedOffset = nl + 1;
                if (!line.trim()) continue;
                try {
                  this.handleEvent(JSON.parse(line));
                } catch (e) {
                  /* ignore parse errors, partial buffers */
                }
              }
            };
            xhr.onprogress = consume;
            xhr.onload = () => {
              consume();
              this.running = false;
              this.currentPhase = null;
              this.currentIndex = null;
            };
            xhr.onerror = () => {
              this.running = false;
              this.error = 'Network error during upload.';
            };
            xhr.send(form);
          },

          handleEvent(evt) {
            this.currentPhase = evt.phase;
            this.currentIndex = evt.index ?? null;

            if (evt.phase === 'reference') {
              this.reference = { peaks: evt.peaks };
              evt.durations?.forEach((d, i) => {
                if (this.files[i]) this.files[i].duration = d;
              });
              evt.channels?.forEach((c, i) => {
                if (this.files[i]) this.files[i].channels = c;
              });
              return;
            }
            if (evt.phase === 'result') {
              const f = this.files[evt.index];
              if (f) this.results[f.id] = evt;
              if (!this.selectedId || !this.targetFiles.some((tf) => tf.id === this.selectedId)) {
                this.selectedId = this.targetFiles[0]?.id || null;
              }
              return;
            }
            if (evt.phase === 'error') {
              this.error = evt.detail || 'Unknown error';
            }
          },

          async copyValues(result) {
            const text = [
              'track: ' + result.name,
              'delay: ' + result.delay_ms.toFixed(3) + ' ms',
              'samples @ 48k: ' + result.delay_samples_48k,
              'samples @ 44.1k: ' + result.delay_samples_44k,
              'polarity: ' + (result.invert_polarity ? 'invert (∅)' : 'normal'),
              'confidence: ' + Math.round(result.confidence * 100) + '%',
            ].join('\n');
            try {
              await navigator.clipboard.writeText(text);
              this.copiedId = result.id;
              setTimeout(() => {
                if (this.copiedId === result.id) this.copiedId = null;
              }, 1400);
            } catch (e) {
              /* clipboard denied */
            }
          },

          async exportCsv() {
            if (!this.hasResults) return;
            const rows = this.targetFiles
              .map((f) => this.results[f.id])
              .filter(Boolean)
              .map((r) => ({
                name: r.name,
                delay_ms: r.delay_ms,
                delay_samples_48k: r.delay_samples_48k,
                delay_samples_44k: r.delay_samples_44k,
                invert_polarity: r.invert_polarity,
                confidence: r.confidence,
                peak_over_median: r.peak_over_median,
                sanity_ok: r.sanity_ok,
              }));
            const resp = await fetch('/api/export', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rows }),
            });
            if (!resp.ok) return;
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'unphase-session.csv';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          },

          // Formatting helpers

          formatSize(bytes) {
            if (!bytes || isNaN(bytes)) return '—';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
          },
          formatDuration(s) {
            if (!s) return '—';
            const m = Math.floor(s / 60);
            const ss = Math.floor(s % 60);
            return m + ':' + String(ss).padStart(2, '0');
          },
          channelLabel(n) {
            if (!n) return '? ch';
            if (n === 1) return 'mono';
            if (n === 2) return 'stereo';
            return n + ' ch';
          },
          truncate(str, n) {
            if (!str) return '';
            return str.length > n ? str.slice(0, n - 1) + '…' : str;
          },
          distanceCm(ms) {
            return Math.round(ms * 34);
          },
          fileStatusLabel(f) {
            if (!this.refId) return 'ready';
            if (this.running && this.currentIndex != null && this.files[this.currentIndex]?.id === f.id) {
              return this.currentPhase === 'decoding' ? 'decoding…' : 'analyzing…';
            }
            if (this.results[f.id]) return 'aligned';
            if (this.error) return 'ready';
            return 'ready';
          },
          fileStatusClass(f) {
            if (this.running && this.currentIndex != null && this.files[this.currentIndex]?.id === f.id) {
              return 'running';
            }
            if (this.results[f.id]) {
              return this.results[f.id].sanity_ok ? 'ok' : 'warn';
            }
            return 'pending';
          },
          headlineHtml(r) {
            const closeName = r.close_is_reference ? this.refFile?.name || 'reference' : r.name;
            let html = 'Delay <em>' + escapeHtml(closeName) + '</em> by <em>' + r.delay_ms.toFixed(2) + ' ms</em>';
            if (r.invert_polarity) html += ' · flip polarity <em>∅</em>';
            return html;
          },
          headlineSub(r) {
            const samples = "<span class='mono'>" + r.delay_samples_48k + '</span>';
            let s = "That's " + samples + ' samples at 48 kHz (' + r.delay_samples_44k + ' @ 44.1 kHz). ';
            s += r.close_is_reference
              ? 'The reference is the <b>close</b> mic — this track arrived later, so delay the reference instead.'
              : 'This mic is the <b>close</b> mic — it arrived first.';
            s += r.invert_polarity
              ? ' Sum with reference only after inverting to avoid cancellation.'
              : ' No polarity change needed.';
            return s;
          },
          techRows(r) {
            return [
              ['Reference', this.refFile?.name || '—'],
              ['Target', r.name],
              ['Duration', (r.duration_s || '—') + ' s · ' + this.channelLabel(r.channels)],
              ['Analysis SR', '48 000 Hz mono'],
              ['Search window', '±50 ms (±2400 samples)'],
              ['Raw lag (b vs a)', r.lag_samples + ' samples'],
              ['Sub-sample', (r.sub_sample_lag - Math.floor(r.sub_sample_lag)).toFixed(3)],
              ['Peak correlation', r.peak_corr.toFixed(3)],
              ['Peak / median', r.peak_over_median.toFixed(1) + '×'],
              ['Envelope lag', r.envelope_lag_samples + ' samples'],
              ['Close mic', r.close_mic],
              ['Sanity check', r.sanity_ok ? 'pass' : 'disagreement'],
            ];
          },

          waveShiftPx() {
            const r = this.selectedResult;
            if (!r || this.waveMode !== 'aligned') return 0;
            return Math.round(Math.min(40, r.delay_ms * 3));
          },

          drawWave(canvas, peaks, color, offsetPx, invert) {
            if (!canvas || !peaks || !peaks.length) return;
            const height = 56;
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.clientWidth || 400;
            canvas.width = w * dpr;
            canvas.height = height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, w, height);

            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            ctx.lineTo(w, height / 2);
            ctx.stroke();

            const n = peaks.length;
            const barW = Math.max(1, w / n);
            ctx.fillStyle = this.resolveColor(color);
            for (let i = 0; i < n; i++) {
              const v = Math.abs(peaks[i]);
              const bh = Math.max(1, v * (height * 0.85));
              const x = i * barW + (offsetPx || 0);
              const y = invert ? height / 2 : (height - bh) / 2;
              ctx.fillRect(x, y, barW * 0.85, invert ? bh / 2 : bh);
              if (invert) {
                ctx.fillRect(x, 0, barW * 0.85, bh / 2);
              }
            }
          },
          resolveColor(v) {
            if (!v || !v.startsWith('var(')) return v;
            const name = v.slice(4, -1).trim();
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#333';
          },
        };
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]);
      }
    </script>
    <style>
      [x-cloak] { display: none !important; }
    </style>
  </body>
</html>
